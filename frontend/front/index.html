<!-- 首页 -->
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<title>首页</title>
		<link rel="stylesheet" href="./layui/css/layui.css">
		<link rel="stylesheet" href="./css/template-common.css"/>
		<link rel="stylesheet" href="./css/template-style.css"/>
	</head>
	<style type="text/css">
		html, body {
			height: 100%;
		}
		#iframe {
			width: 100%;
			margin-top: 0;
						padding-top: 60px;
					}
		#header {
			height: auto;
			background: #fff;
			border-bottom: 0;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			z-index: 1000;
		}

		#header .nav-top {
			display: flex;
			align-items: center;
			padding: 0 20px;
			font-size: 16px;
			color: #2a8a15;
			box-sizing: border-box;
			height: 0;
			background: #f7f7f7;
			box-shadow: 0 1px 6px rgba(0,0,0,.3);
			justify-content: space-between;
			position: relative;
			z-index: 1;
		}

		#header .nav-top-img {
			width: 124px;
			height: 40px;
			padding: 0;
			margin: 0;
			border-radius: 6px;
			border-width: 0;
			border-style: solid;
			border-color: rgba(0,0,0,.3);
			box-shadow: 0 0 6px rgba(0,0,0,.3);
		}

		#header .nav-top-title {
			line-height: 40px;
			font-size: 16px;
			color: #333;
			padding: 0 10px;
			margin: 0 10px;
			border-radius: 6px;
			border-width: 0;
			border-style: solid;
			border-color: rgba(0,0,0,.3);
						background-color: rgba(0,0,0,0);
						box-shadow: 0 0 6px rgba(0,0,0,.3);
		}

		#header .nav-top-tel {
			line-height: 40px;
			font-size: 16px;
			color: #333;
			padding: 0 10px;
			margin: 0;
			border-radius: 6px;
			border-width: 0;
			border-style: solid;
			border-color: rgba(0,0,0,.3);
			box-shadow: 0 0 6px rgba(0,0,0,.3);
		}

		#header .navs {
			display: flex;
			padding: 0 20px;
			align-items: center;
			box-sizing: border-box;
			height: 60px;
			background: #f7f7f7;
			box-shadow: 0 1px 6px rgba(0,0,0,0);
			justify-content: flex-start;
		}
		#header .navs1 {
			width: 200px;
			height: 100vh;
			background: darkgoldenrod;
			position: absolute;
			top: 0;
			display: block;
			padding: 0;
			overflow-y: scroll;
			scrollbar-width: none;
			-ms-overflow-style: none;
		}
		
		#header .navs.navs1::-webkit-scrollbar {
			display: none;
		}
		
		#header .navs1 .list {
			display: flex;
			flex-direction: column;
		}
		#header .navs .title {
			width: auto;
			line-height: 35px;
			font-size: 20px;
			color: #333;
			padding: 0 10px;
			margin: 0px 5px 0;
			border-radius: 6px;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			background-color: transparent;
			box-shadow: none;
		}
		#header .navs li {
			display: inline-block;
			width: auto;
			line-height: 25px;
			padding: 0px 10px 0 10px;
			margin: 0px 1px 0 0;
			color: #666;
			font-size: 16px;
			border-radius: 6px 6px 50% 50%;
			border-width: 0 0 30px 0;
			border-style: solid;
			border-color: rgba(255, 69, 0, 1);
			background-color: #FFE4E9;
			box-shadow: 0 0 0px rgba(0,0,0,.1);
			text-align: center;
			box-sizing: border-box;
			cursor: pointer;
		}
		#header .navs li a{
			color: inherit;
			position: relative;
			display: inline-block;
		}
		#header .navs li.current a{
			color: inherit;
		}
		#header .navs li a:hover{
			color: inherit;
		}
		#header .navs li.current {
			color: #555;
			font-size: 16px;
			border-radius: 6px 6px 50% 50%;
			border-width: 0px 0 30px 0;
			border-style: solid;
			border-color: #FFE4E9;
			background-color: rgba(255, 69, 0, 1);
			box-shadow: 0 0 0px rgba(255,0,0,.8);
		}
		#header .navs li:hover {
			color: #555;
			font-size: 16px;
			border-radius: 6px 6px 50% 50%;
			border-width: 0px 0 30px 0;
			border-style: solid;
			border-color: #FFE4E9;
			background-color: rgba(255, 69, 0, 1);
			box-shadow: 0 0 0px rgba(0,0,0,.3);
		}
		#header .navs li.nav-has-badge {
			position: relative;
		}
		#header .navs li .nav-notify-badge {
			position: absolute;
			top: -6px;
			right: -8px;
			min-width: 16px;
			height: 16px;
			padding: 0 4px;
			line-height: 16px;
			font-size: 11px;
			color: #fff;
			background: #e53935;
			border-radius: 8px;
			text-align: center;
			box-sizing: border-box;
			z-index: 3;
			pointer-events: none;
		}
	</style>
	<body>
		<!-- start 顶部导航栏 -->
		<div id="header">
			<div v-if='false' class="nav-top">
			  <img v-if='false' class="nav-top-img" src='https://www.baidu.com/img/flexible/logo/pc/result@2.png'>
			  <div v-if="false" class="nav-top-title">{{projectName}}</div>
			  <div class="nav-top-tel"></div>
			</div>
					    <div class="navs">
		    	<!-- <div class="logo" style="font-size: 20px;top: 32px;color: #fff;font-weight: bold;margin-left: -200px;width: 240px;" v-text="projectName"></div> -->
				<div class="title" v-if="true" v-text="projectName"></div>
				<div class="list">
					<ul>
						<li class='current'><a href="javascript:navPage('./pages/home/home.html')" class="menumain"><i v-if="false" class="layui-icon layui-icon-home"></i>首页</a></li>
						<li v-for="(item,index) in indexNav" v-bind:key="index" :class="{'nav-has-badge': item.url.indexOf('notify')>=0 && notifyUnreadCount>0}"><a :href="'javascript:navPage(\''+item.url+'\')'" class="menumain" style="cursor: pointer;"><i v-if="false" class="layui-icon" :class="iconArr[index]"></i>{{item.name}}<span v-if="item.url.indexOf('notify')>=0 && notifyUnreadCount>0" class="nav-notify-badge">{{ notifyUnreadCount > 99 ? '99+' : notifyUnreadCount }}</span></a></li>
						<li><a href="javascript:centerPage();" class="menumain"><i v-if="false" class="layui-icon layui-icon-username"></i>个人中心</a></li>
						<li v-if="isAdmin"><a :href="adminurl" target="_blank" class="menumain" style="cursor: pointer;"><i v-if="false" class="layui-icon layui-icon-link"></i>后台管理</a></li>
					</ul>
				</div>
		    </div>
								</div>
		<!-- end 顶部导航栏 -->

		<iframe src="./pages/home/home.html" id="iframe" frameborder="0" scrolling="no" width="100%" onload="changeFrameHeight"></iframe>
    <div id="tabbar" class="tabbar" :style='{"padding":"0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"#FFE4E9","borderRadius":"0","borderWidth":"0","borderStyle":"solid"}' style="position: relative;">
      <div :style='{"padding":"0 10px","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"10px auto","borderColor":"#F0C0C8","backgroundColor":"#FFE4E9","color":"#333","textAlign":"center","borderRadius":"0","borderWidth":"0","width":"100%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="company"></div>
      <div :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"10px auto","borderColor":"#F0C0C8","backgroundColor":"#FFE4E9","color":"#333","textAlign":"center","borderRadius":"0","borderWidth":"0","width":"100%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="record"></div>
      <div :style='{"padding":"40px","boxShadow":"0 0 0px rgba(255,0,0,0)","margin":"0 auto","borderColor":"#F0C0C8","backgroundColor":"#FFE4E9","color":"#333","textAlign":"center","borderRadius":"0","borderWidth":"1px 0","width":"40%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="desc"></div>
    </div>

		<script src="./js/jquery.js"></script>
		<script src="./modules/config.js"></script>
		<script src="./layui/layui.js"></script>
		<script src="./js/vue.js"></script>
		<script src="./js/config.js"></script>

		<script>
      var vue1 = new Vue({el: '#tabbar'})

			var vue = new Vue({
				el: '#header',
				data: {
					iconArr: ['layui-icon-gift','layui-icon-email','layui-icon-logout','layui-icon-transfer','layui-icon-slider','layui-icon-print','layui-icon-cols','layui-icon-snowflake','layui-icon-note','layui-icon-flag','layui-icon-theme','layui-icon-website','layui-icon-console','layui-icon-face-surprised','layui-icon-template-1','layui-icon-app','layui-icon-read','layui-icon-component','layui-icon-file-b','layui-icon-unlink','layui-icon-tabs','layui-icon-form','layui-icon-chat'],
					indexNav: indexNav,
					cartFlag: cartFlag,
					adminurl: adminurl,
					chatFlag: chatFlag,
					projectName: projectName,
					isAdmin: false,
					notifyUnreadCount: 0,
				},
				mounted: function() {
					this.bindClickOnLi();
					this.checkAdmin();
					this.initNotifyUnread();
				},
				created() {
					this.iconArr.sort(()=>{
					  return (0.5-Math.random())
					})
					this.checkAdmin();
				},
				methods: {
					checkAdmin() {
						var userTable = localStorage.getItem('userTable');
						this.isAdmin = (userTable === 'admin');
					},
					initNotifyUnread() {
						var self = this;
						var base = (typeof apiBaseUrl !== 'undefined' && apiBaseUrl) ? apiBaseUrl : 'http://localhost:8080/recipe-sharing-platform/';
						if (base.slice(-1) !== '/') {
							base += '/';
						}
						// 不依赖 layui http 模块加载顺序，避免角标永远不请求
						self.refreshNotifyUnread = function() {
							if (!localStorage.getItem('Token') || localStorage.getItem('userTable') !== 'user') {
								self.notifyUnreadCount = 0;
								return;
							}
							var uid = localStorage.getItem('userid');
							var params = { t: Date.now() };
							var perKey = uid ? 'notifyPerTabLastReadMs_' + uid : null;
							var perRaw = perKey ? localStorage.getItem(perKey) : null;
							if (perRaw) {
								params.lastReadByTab = perRaw;
							} else {
								var lrKey = uid ? 'notifyLastReadAtMillis_' + uid : null;
								var lrVal = lrKey ? localStorage.getItem(lrKey) : null;
								if (lrVal) {
									params.lastReadAt = lrVal;
								}
							}
							jQuery.ajax({
								url: base + 'notify/unreadCount',
								type: 'GET',
								data: params,
								dataType: 'json',
								beforeSend: function(xhr) {
									xhr.setRequestHeader('Token', localStorage.getItem('Token'));
								},
								success: function(result) {
									if (result && result.code === 0 && result.data && result.data.unreadCount != null) {
										var n = parseInt(result.data.unreadCount, 10);
										self.notifyUnreadCount = isNaN(n) ? 0 : n;
									}
								}
							});
						};
						window.addEventListener('message', function(e) {
							if (e.data && e.data.type === 'notifyMarkedRead' && typeof self.refreshNotifyUnread === 'function') {
								self.refreshNotifyUnread();
							}
						});
						self.refreshNotifyUnread();
						setInterval(function() { self.refreshNotifyUnread(); }, 60000);
						setTimeout(function() { self.refreshNotifyUnread(); }, 1500);
					},
					jump(url) {
						jump(url)
					},
					bindClickOnLi() {
						let list = document.getElementsByTagName("li");
						for(var i = 0;i<list.length;i++){
							list[i].onclick = function(){
								$(this).addClass("current").siblings().removeClass("current");
                                localStorage.setItem("checkedLiIndex",$(this).index());
							}
						}
					}
				}
			});

			layui.use(['element','layer'], function() {
				var element = layui.element;
				var layer = layui.layer;
				
				// 监听localStorage变化，更新isAdmin状态；消息已读时间在其他标签页更新时同步角标
				window.addEventListener('storage', function(e) {
					if (e.key === 'userTable') {
						vue.checkAdmin();
					}
					if (e.key && (e.key.indexOf('notifyLastReadAtMillis_') === 0 || e.key.indexOf('notifyPerTabLastReadMs_') === 0) && typeof vue.refreshNotifyUnread === 'function') {
						vue.refreshNotifyUnread();
					}
				});
				
				// 定期检查用户角色（用于同窗口内的登录状态变化）
				setInterval(function() {
					vue.checkAdmin();
				}, 1000);
			});

			function chatTap(){
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					layui.layer.open({
						type: 2,
						title: '客服',
						area: ['600px', '600px'],
						content: './pages/chat/chat.html'
					});
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

			// 导航栏跳转
			function navPage(url) {
				localStorage.setItem('iframeUrl', url);
				document.getElementById('iframe').src = url;
			}

			// 跳转到个人中心
			function centerPage() {
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					// 文件夹也已经重命名为 user / admin
					localStorage.setItem('iframeUrl', './pages/' + userTable + '/center.html');
					document.getElementById('iframe').src = './pages/' + userTable + '/center.html';
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

			var iframeUrl = localStorage.getItem('iframeUrl');
			var iframeEl = document.getElementById('iframe');
			iframeEl.src = iframeUrl  || './pages/home/home.html';
			iframeEl.addEventListener('load', function() {
				function pingUnread() {
					if (typeof vue !== 'undefined' && typeof vue.refreshNotifyUnread === 'function') {
						vue.refreshNotifyUnread();
					}
				}
				pingUnread();
				setTimeout(pingUnread, 400);
			});

            let list = document.getElementsByTagName("li");
            for(var i = 0;i<list.length;i++){
                if(i==localStorage.getItem("checkedLiIndex")) {
                    $(list[i]).addClass("current").siblings().removeClass("current");
                }
            }

      // var i = 0;
      setInterval(function(){
        // i++;
        // if(i<50) changeFrameHeight();
        changeFrameHeight();
      },200)

      function changeFrameHeight() {
        var iframe = document.getElementById('iframe');
        // iframe.height = 'auto';
          if (iframe) {
              var iframeWin = iframe.contentWindow || iframe.contentDocument.parentWindow;
              if (iframeWin.document.body) {
                  iframe.height = iframeWin.document.body.scrollHeight;
              }
          }
      };

			//  窗口变化时候iframe自适应
			// function changeFrameHeight() {
				// var header = document.getElementById('header').scrollHeight;
    //     let isshow = true
    //     var tabbar = 0
    //     if(isshow) {
    //       tabbar = document.getElementById('tabbar').scrollHeight
    //     }
				// var ifm = document.getElementById("iframe");
				// ifm.height = document.documentElement.clientHeight - header - tabbar;
				// ifm.width = document.documentElement.clientWidth;
			// }

			// reasize 事件 窗口大小变化后执行的方法
			window.onresize = function() {
				changeFrameHeight();
			}
		</script>
	</body>
</html>
