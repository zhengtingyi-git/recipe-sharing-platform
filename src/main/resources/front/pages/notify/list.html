<!-- 消息中心：被点赞、被收藏、被回复 -->
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<title>消息中心</title>
		<link rel="stylesheet" href="../../layui/css/layui.css">
		<link rel="stylesheet" href="../../css/style.css" />
		<link rel="stylesheet" href="../../css/theme.css" />
		<link rel="stylesheet" href="../../css/common.css" />
	</head>
	<style>
		#swiper { overflow: hidden; }
		.index-title {
			text-align: center;
			box-sizing: border-box;
			width: 980px;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
		}
		.notify-tabs {
			display: flex;
			margin-bottom: 16px;
			border-bottom: 1px solid #eee;
		}
		.notify-tabs .tab {
			padding: 10px 20px;
			cursor: pointer;
			color: #666;
			font-size: 15px;
		}
		.notify-tabs .tab.current {
			color: red;
			font-weight: bold;
			border-bottom: 2px solid red;
			margin-bottom: -1px;
		}
		.notify-tabs .tab:hover { color: red; }
		.notify-list {
			padding: 0 20px 20px;
			box-shadow: 0 0 6px rgba(255,0,0,.2);
			margin: 0 auto 20px;
			border-radius: 4px;
			background: #fff;
			max-width: 900px;
		}
		.notify-item {
			padding: 14px 0;
			border-bottom: 1px solid #f0f0f0;
			display: flex;
			align-items: flex-start;
		}
		.notify-item:last-child { border-bottom: none; }
		.notify-avatar {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			object-fit: cover;
			margin-right: 12px;
			flex-shrink: 0;
		}
		.notify-body { flex: 1; }
		.notify-title { font-size: 14px; color: #333; margin-bottom: 4px; }
		.notify-desc { font-size: 13px; color: #666; }
		.notify-time { font-size: 12px; color: #999; margin-top: 4px; }
		.notify-empty { text-align: center; padding: 40px 0; color: #999; }
		.notify-pic {
			max-width: 200px;
			max-height: 120px;
			border-radius: 4px;
			margin-top: 6px;
		}
	</style>
	<body>
		<div id="app">
			<div class="layui-carousel" id="swiper" :style='{"boxShadow":"0 0 8px rgba(255, 69, 0, 1)","margin":"0px 0 0 0","borderColor":"rgba(0, 0, 0, 0.75)","borderRadius":"20px","borderWidth":"5px 0 0 0","width":"100%","borderStyle":"solid"}'>
				<div carousel-item id="swiper-item">
					<div v-for="(item,index) in swiperList" :key="index">
						<img style="width: 100%;height: 100%;object-fit:cover;" :src="item.img" />
					</div>
				</div>
			</div>

			<div class="index-title" :style='{"padding":"10px","boxShadow":"0 0 5px rgba(255,0,0,.8)","margin":"10px auto","borderColor":"rgba(255, 255, 255, 1)","backgroundColor":"rgba(255, 255, 255, 1)","color":"rgba(255, 0, 0, 1)","borderRadius":"50% 50px","borderWidth":"2px","fontSize":"20px","borderStyle":"solid","height":"auto"}'>
				<span>NOTIFY / CENTER</span><span>消息中心</span>
			</div>

			<div class="notify-list">
				<div class="notify-tabs">
					<div class="tab" :class="{ current: currentTab === 'reply' }" @click="currentTab='reply'">回复我的</div>
					<div class="tab" :class="{ current: currentTab === 'thumbsup' }" @click="currentTab='thumbsup'">点赞我的</div>
					<div class="tab" :class="{ current: currentTab === 'storeup' }" @click="currentTab='storeup'">收藏我的</div>
					<div class="tab" :class="{ current: currentTab === 'followMe' }" @click="currentTab='followMe'">关注我的</div>
				</div>

				<!-- 回复我的 -->
				<template v-if="currentTab === 'reply'">
					<template v-if="replyList.length">
						<div v-for="(item,index) in replyList" :key="'r'+index" class="notify-item">
							<img class="notify-avatar" :src="item.touxiang ? (baseurl + item.touxiang) : '../../img/avator.png'" @error="$event.target.src='../../img/avator.png'" />
							<div class="notify-body">
								<div class="notify-title">{{ item.username || '用户' }} 回复了您的留言</div>
								<div class="notify-desc" v-if="item.messageContent">您的留言：{{ item.messageContent | forumPostDesc }}</div>
								<div class="notify-desc" v-if="item.content">回复内容：{{ item.content | replyText }}</div>
								<img v-if="item.picture" class="notify-pic" :src="baseurl + item.picture" />
								<div class="notify-time">{{ item.addtime }}</div>
							</div>
						</div>
					</template>
					<div v-else class="notify-empty">暂无回复消息</div>
				</template>

				<!-- 点赞我的 -->
				<template v-if="currentTab === 'thumbsup'">
					<template v-if="thumbsupList.length">
						<div v-for="(item,index) in thumbsupList" :key="'t'+index" class="notify-item" @click="jumpToDetail(item)">
							<img class="notify-avatar" :src="item.operatorTouxiang ? (baseurl + item.operatorTouxiang) : '../../img/avator.png'" @error="$event.target.src='../../img/avator.png'" />
							<div class="notify-body">
								<div class="notify-title">{{ item.operatorName }} 赞了您的《{{ item.name }}》</div>
								<div class="notify-desc" v-if="item.picture">
									<img class="notify-pic" :src="baseurl + item.picture" />
								</div>
								<div class="notify-time">{{ item.addtime }}</div>
							</div>
						</div>
					</template>
					<div v-else class="notify-empty">暂无点赞消息</div>
				</template>

				<!-- 收藏我的 -->
				<template v-if="currentTab === 'storeup'">
					<template v-if="storeupList.length">
						<div v-for="(item,index) in storeupList" :key="'s'+index" class="notify-item" @click="jumpToDetail(item)">
							<img class="notify-avatar" :src="item.operatorTouxiang ? (baseurl + item.operatorTouxiang) : '../../img/avator.png'" @error="$event.target.src='../../img/avator.png'" />
							<div class="notify-body">
								<div class="notify-title">{{ item.operatorName }} 收藏了您的《{{ item.name }}》</div>
								<div class="notify-desc" v-if="item.picture">
									<img class="notify-pic" :src="baseurl + (item.picture ? item.picture.split(',')[0] : '')" />
								</div>
								<div class="notify-time">{{ item.addtime }}</div>
							</div>
						</div>
					</template>
					<div v-else class="notify-empty">暂无收藏消息</div>
				</template>

				<!-- 关注我的 -->
				<template v-if="currentTab === 'followMe'">
					<template v-if="followMeList.length">
						<div v-for="(item,index) in followMeList" :key="'f'+index" class="notify-item" @click="jump('../user/profile.html?id=' + (item.followerId || item.follower_id))">
							<img class="notify-avatar" :src="(item.operatorTouxiang || item.touxiang) ? (baseurl + (item.operatorTouxiang || item.touxiang)) : '../../img/avator.png'" @error="$event.target.src='../../img/avator.png'" />
							<div class="notify-body">
								<div class="notify-title">{{ item.operatorName || item.operator_name || '用户' }} 关注了您</div>
								<div class="notify-time">{{ item.addtime }}</div>
							</div>
						</div>
					</template>
					<div v-else class="notify-empty">暂无关注消息</div>
				</template>
			</div>
		</div>

		<script src="../../layui/layui.js"></script>
		<script src="../../js/vue.js"></script>
		<script src="../../js/config.js"></script>
		<script src="../../modules/config.js"></script>
		<script src="../../js/utils.js"></script>
		<script>
			var vue = new Vue({
				el: '#app',
				data: {
					swiperList: [{ img: '../../img/banner.jpg' }],
					baseurl: '',
					currentTab: 'reply',
					replyList: [],
					thumbsupList: [],
					storeupList: [],
					followMeList: []
				},
				filters: {
					forumPostDesc: function(val) {
						if (!val) return '';
						var s = String(val).replace(/<[^>]*>/g, '');
						return s.length > 80 ? s.substring(0, 80) + '...' : s;
					},
					// 处理 JSON 格式的回复内容，只展示真正的文字
					replyText: function(val) {
						if (!val) return '';
						var s = String(val).trim();
						// 不是 JSON，直接返回
						if (!(s.startsWith('{') || s.startsWith('['))) {
							return s;
						}
						try {
							var obj = JSON.parse(s);
							// 数组：拼接其中的 content 字段
							if (Array.isArray(obj)) {
								var texts = obj.map(function(it) {
									if (!it) return '';
									if (typeof it === 'string') return it;
									if (it.content) return it.content;
									return '';
								}).filter(function(t) { return t; });
								return texts.join('；') || s;
							}
							// 对象：优先取 content，其次取 reply
							if (obj && typeof obj === 'object') {
								return obj.content || obj.reply || s;
							}
						} catch (e) {
							// 解析失败就原样返回
							return s;
						}
						return s;
					}
				},
				methods: {
					jump(url) { jump(url); },
					jumpToDetail(item) {
						if (item.tablename && item.refid) {
							jump('../' + item.tablename + '/detail.html?id=' + item.refid);
						}
					}
				}
			});

			layui.use(['layer', 'element', 'carousel', 'http', 'jquery'], function() {
				var layer = layui.layer;
				var element = layui.element;
				var carousel = layui.carousel;
				var http = layui.http;
				var jquery = layui.jquery;

				vue.baseurl = http.baseurl;

				// 未登录跳转登录
				if (!localStorage.getItem('Token') || !localStorage.getItem('userid')) {
					layer.msg('请先登录', { icon: 0 }, function() {
						window.location.href = '../login/login.html';
					});
					return;
				}

				// 轮播图
				http.request('config/list', 'get', { page: 1, limit: 5 }, function(res) {
					if (res.data && res.data.list && res.data.list.length > 0) {
						var arr = [];
						for (var i = 0; i < res.data.list.length; i++) {
							var item = res.data.list[i];
							if (item.name && item.name.indexOf('picture') >= 0 && item.value) {
								arr.push({ img: http.baseurl + item.value });
							}
						}
						if (arr.length) vue.swiperList = arr;
						vue.$nextTick(function() {
							carousel.render({
								elem: '#swiper',
								width: '100%',
								height: '300px',
								arrow: 'hover',
								anim: 'default',
								autoplay: true,
								interval: 3000,
								indicator: 'inside'
							});
						});
					}
				});

				// 消息中心数据
				http.request('notify/center', 'get', {}, function(res) {
					if (res.code === 0 && res.data) {
						vue.replyList = res.data.replyList || [];
						vue.thumbsupList = res.data.thumbsupList || [];
						vue.storeupList = res.data.storeupList || [];
						vue.followMeList = res.data.followMeList || [];
					} else {
						layer.msg(res.msg || '加载失败', { icon: 5 });
						if (res.code === 401 || (res.msg && res.msg.indexOf('登录') >= 0)) {
							setTimeout(function() { window.location.href = '../login/login.html'; }, 1500);
						}
					}
				});
			});
		</script>
	</body>
</html>
